name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libomp

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Install Python test deps
        run: pip install -r tests/requirements-dev.txt

      - name: Install prot2exon Python wrapper
        run: pip install -e python/

      - name: Run pytest
        run: pytest -v

  # Build a wheel the same way the release pipeline does (scikit-build-core
  # compiles + bundles the binary) and smoke-test it in a clean environment,
  # so a broken wheel build is caught on PRs rather than only at tag time.
  wheel:
    name: wheel build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: pip wheel . --no-deps -w dist/
      - name: Install + run from a clean venv
        run: |
          python -m venv /tmp/v
          /tmp/v/bin/pip install dist/*.whl
          /tmp/v/bin/prot2exon --version
          /tmp/v/bin/prot2exon fetch list >/dev/null
